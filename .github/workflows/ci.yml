name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Install tools
        run: |
          pip install pre-commit commitizen checkov
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          curl -Lo terraform-docs.tar.gz \
            https://github.com/terraform-docs/terraform-docs/releases/download/v0.17.0/terraform-docs-v0.17.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz && chmod +x terraform-docs && sudo mv terraform-docs /usr/local/bin/

      - name: Run pre-commit
        run: pre-commit run --all-files

  validate-configs:
    name: Validate repo configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint -d '{extends: default, rules: {line-length: {max: 120}}}' \
            .pre-commit-config.yaml \
            .github/workflows/ci.yml \
            .github/workflows/changelog.yml

      - name: Check required files exist
        run: |
          required=(LICENSE README.md CONTRIBUTING.md CHANGELOG.md CONVENTIONAL-COMMITS.md
                    .pre-commit-config.yaml pyproject.toml
                    .github/pull_request_template.md docs/branch-protection.md)
          missing=()
          for f in "${required[@]}"; do [[ -f "$f" ]] || missing+=("$f"); done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required files: ${missing[*]}"; exit 1
          fi
          echo "All required files present."
